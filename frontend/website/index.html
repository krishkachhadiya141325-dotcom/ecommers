<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harmony Furniture</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: '#B88E2F',
            cream: '#F9F1E7',
            dark: '#3A3A3A',
            muted: '#9F9F9F',
          },
          fontFamily: {
            poppins: ['Poppins', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Poppins', sans-serif; }
    .product-card:hover .product-overlay { opacity: 1; }
    .nav-link { transition: color 0.2s; }
    .nav-link:hover { color: #B88E2F; }
    .btn-gold { background: #B88E2F; color: white; }
    .btn-gold:hover { background: #9a7628; }
    .btn-outline-gold { border: 1px solid #B88E2F; color: #B88E2F; }
    .btn-outline-gold:hover { background: #B88E2F; color: white; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #B88E2F; border-radius: 3px; }
    .sidebar-link { transition: all 0.2s; }
    .sidebar-link:hover { background: #B88E2F22; color: #B88E2F; padding-left: 1.25rem; }
    .sidebar-link.active { background: #B88E2F; color: white; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
  </style>
</head>
<body class=" bg-white text-dark">
  <div id="root"></div>

  


  <script type="text/babel" src="pages/Home.js"></script>
  <script type="text/babel" src="pages/Shop.js"></script>
  <script type="text/babel" src="pages/Product.js"></script>
  <script type="text/babel" src="pages/Cart.js"></script>
  <script type="text/babel" src="pages/Checkout.js"></script>
  <script type="text/babel" src="pages/Contact.js"></script>
  <script type="text/babel" src="pages/Blog.js"></script>
  <script type="text/babel" src="pages/Auth.js"></script>
  <script type="text/babel" src="pages/Admin.js"></script>

  <script type="text/babel">
    const { useState, useEffect, createContext, useContext } = React;



    const AppContext = createContext(null);

    const PRODUCTS_DATA = [
      { id:1, name:'Syltherine', category:'Living', price:2500000, oldPrice:3500000, image:'sofa.png', badge:'Sale', rating:4 },
      { id:2, name:'Leviosa',    category:'Living', price:2500000, oldPrice:null,    image:'sofa.png', badge:'',     rating:5 },
      { id:3, name:'Lolito',     category:'Bedroom',price:7000000, oldPrice:14000000,image:'bedroom.png', badge:'Sale', rating:4 },
      { id:4, name:'Respira',    category:'Living', price:500000,  oldPrice:null,    image:'sofa.png', badge:'New',  rating:5 },
      { id:5, name:'Grifo',      category:'Dining', price:1500000, oldPrice:null,    image:'dining.png', badge:'',   rating:4 },
      { id:6, name:'Muggo',      category:'Dining', price:150000,  oldPrice:null,    image:'dining.png', badge:'',   rating:3 },
      { id:7, name:'Pingky',     category:'Bedroom',price:7000000, oldPrice:14000000,image:'bedroom.png', badge:'Sale',rating:4},
      { id:8, name:'Potty',      category:'Bedroom',price:500000,  oldPrice:null,    image:'bedroom.png', badge:'New',rating:5 },
    ];



    function Navbar({ page, setPage, cart, onLogout }) {
      const [menuOpen, setMenuOpen] = useState(false);
      const navItems = ['home','shop','contact','blog'];
      return (
        <nav className="sticky top-0 z-50 bg-white shadow-sm px-6 md:px-16 py-4 flex items-center justify-between">
          <button onClick={() => setPage('home')} className="flex items-center gap-2 font-bold text-2xl text-dark">
            <span className="text-gold">✦</span> Harmony
          </button>
          <div className="hidden md:flex gap-8">
            {navItems.map(n => (
              <button key={n} onClick={() => setPage(n)}
                className={`nav-link capitalize font-medium ${page===n?'text-gold border-b-2 border-gold':''}`}>
                {n}
              </button>
            ))}
          </div>
          <div className="flex items-center gap-5">
            <button onClick={() => setPage('shop')} className="text-dark hover:text-gold transition">🔍</button>
            <button onClick={() => setPage('cart')} className="relative text-dark hover:text-gold transition">
              🛒
              {cart.length > 0 && (
                <span className="absolute -top-2 -right-2 bg-gold text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">
                  {cart.reduce((a,c)=>a+c.qty,0)}
                </span>
              )}
            </button>
            <button onClick={onLogout} className="text-dark hover:text-gold transition text-sm font-semibold flex items-center gap-1 border border-gray-200 px-3 py-1.5 rounded-full hover:border-gold transition" title="Logout">
              🚪 Logout
            </button>
            <button className="md:hidden text-2xl" onClick={() => setMenuOpen(!menuOpen)}>☰</button>
          </div>
          {menuOpen && (
            <div className="absolute top-16 left-0 w-full bg-white shadow-lg flex flex-col items-center gap-4 py-6 md:hidden z-50">
              {navItems.map(n => (
                <button key={n} onClick={() => { setPage(n); setMenuOpen(false); }}
                  className="capitalize font-medium text-dark hover:text-gold">{n}</button>
              ))}
              <button onClick={onLogout} className="text-red-500 font-medium">🚪 Logout</button>
            </div>
          )}
        </nav>
      );
    }



    function Footer({ setPage }) {
      return (
        <footer className="border-t border-gray-200 mt-16">
          <div className="px-6 md:px-16 py-12 grid grid-cols-1 md:grid-cols-4 gap-10">
            <div>
              <h3 className="text-xl font-bold mb-4"><span className="text-gold">✦</span> Harmony</h3>
              <p className="text-muted text-sm leading-relaxed">marwadi university ,uplaa kaatha 3699999</p>
            </div>
            <div>
              <h4 className="font-semibold text-muted mb-4 uppercase text-xs tracking-widest">Links</h4>
              <ul className="space-y-3">
                {['home','shop','about','contact'].map(l => (
                  <li key={l}><button onClick={() => setPage(l)} className="capitalize hover:text-gold transition text-sm">{l}</button></li>
                ))}
              </ul>
            </div>
            <div>
              <h4 className="font-semibold text-muted mb-4 uppercase text-xs tracking-widest">Help</h4>
              <ul className="space-y-3 text-sm text-dark">
                {['Payment Options','Returns','Privacy Policies'].map(l=>(
                  <li key={l} className="hover:text-gold cursor-pointer transition">{l}</li>
                ))}
              </ul>
            </div>
            <div>
              <h4 className="font-semibold text-muted mb-4 uppercase text-xs tracking-widest">Newsletter</h4>
              <div className="flex gap-2">
                <input className="border-b border-dark flex-1 text-sm outline-none py-1" placeholder="Enter your email"/>
                <button className="text-sm font-semibold border-b border-dark pb-1 hover:text-gold hover:border-gold transition">SUBSCRIBE</button>
              </div>
            </div>
          </div>
          <div className="border-t border-gray-200 px-16 py-4 flex items-center justify-between text-sm text-muted">
            <span>© 2024 Harmony. All rights reserved.</span>
            <div className="flex gap-6">
              {['Privacy Policy','Terms & Conditions'].map(t=>(
                <span key={t} className="hover:text-gold cursor-pointer transition">{t}</span>
              ))}
            </div>
          </div>
        </footer>
      );
    }



    function App() {
      const [authRole, setAuthRole] = useState(null);
      const [page, setPage]         = useState('home');
      const [cart, setCart]         = useState([]);
      const [wishlist, setWishlist] = useState([]);
      const [selectedProduct, setSelectedProduct] = useState(null);

      const handleLogout = () => {
        setAuthRole(null);
        setPage('home');
        setCart([]);
      };

      const addToCart = (product) => {
        setCart(prev => {
          const existing = prev.find(i => i.id === product.id);
          if (existing) return prev.map(i => i.id===product.id ? {...i, qty: i.qty+1} : i);
          return [...prev, { ...product, qty:1 }];
        });
      };

      const removeFromCart = (id) => setCart(prev => prev.filter(i => i.id !== id));

      const updateQty = (id, qty) => {
        if (qty < 1) { removeFromCart(id); return; }
        setCart(prev => prev.map(i => i.id===id ? {...i, qty} : i));
      };

      const navigateToProduct = (product) => {
        setSelectedProduct(product);
        setPage('product');
      };



      if (!authRole) {
        return <AuthPage onLogin={setAuthRole} />;
      }



      if (authRole === 'admin') {
        return (
          <AppContext.Provider value={{ cart, addToCart, removeFromCart, updateQty, wishlist, setWishlist, selectedProduct, PRODUCTS_DATA }}>
            <AdminPanel setPage={setPage} page={page} cart={cart} onLogout={handleLogout} />
          </AppContext.Provider>
        );
      }



      return (
        <AppContext.Provider value={{ cart, addToCart, removeFromCart, updateQty, wishlist, setWishlist, selectedProduct, PRODUCTS_DATA }}>
          <Navbar page={page} setPage={setPage} cart={cart} onLogout={handleLogout} />
          <div className="fade-in">
            {page === 'home'     && <HomePage     setPage={setPage} navigateToProduct={navigateToProduct} addToCart={addToCart} />}
            {page === 'shop'     && <ShopPage     setPage={setPage} navigateToProduct={navigateToProduct} addToCart={addToCart} />}
            {page === 'product'  && <ProductPage  setPage={setPage} addToCart={addToCart} />}
            {page === 'cart'     && <CartPage     setPage={setPage} />}
            {page === 'checkout' && <CheckoutPage setPage={setPage} />}
            {page === 'contact'  && <ContactPage  />}
            {page === 'blog'     && <BlogPage     />}
          </div>
          <Footer setPage={setPage} />
        </AppContext.Provider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  </body>

</html>
